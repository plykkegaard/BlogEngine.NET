# SonarQube Project Configuration for BlogEngine.NET
# This file configures SonarQube analysis scope to focus on .NET code
# and exclude JavaScript, Node.js, and third-party libraries

# Project Identification
sonar.projectKey=blogengine.net
sonar.projectName=BlogEngine.NET
sonar.projectVersion=1.0

# Source Code Location
sonar.sources=BlogEngine/BlogEngine.Core,BlogEngine/BlogEngine.NET
sonar.tests=BlogEngine/BlogEngine.Tests

# Language Configuration
sonar.language=cs

# File Inclusions - Only analyze .NET and configuration files
sonar.inclusions=**/*.cs,**/*.csproj,**/*.config,**/*.aspx,**/*.ascx,**/*.asax

# File Exclusions - Exclude JavaScript, third-party libraries, and Node.js
sonar.exclusions=\
  lib/**/*,\
  node_modules/**/*,\
  **/packages/**/*,\
  **/bin/**/*,\
  **/obj/**/*,\
  **/*.min.js,\
  **/*.min.css,\
  **/syntaxhighlighter_3.0.83/**/*

# Test File Patterns
sonar.tests=BlogEngine/BlogEngine.Tests
sonar.test.inclusions=**/*Tests.cs,**/*Test.cs,**/Test*.cs
sonar.test.exclusions=**/bin/**/*,**/obj/**/*

# Code Coverage (optional - enable if you have coverage data)
# sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
# sonar.coverage.exclusions=BlogEngine/BlogEngine.Tests/**/*

# Analysis Settings
sonar.sourceEncoding=UTF-8
sonar.log.level=INFO
